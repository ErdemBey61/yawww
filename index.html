<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ben 10 Quiz Oyunu</title>
<style>
body { font-family: Arial, sans-serif; background:#f0f0f0; text-align:center; padding:20px;}
h1 { color:#2c3e50; }
.quiz-box { background:white; padding:20px; margin:20px auto; width:80%; max-width:600px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2);}
button { padding:10px 15px; margin:10px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; width:80%;}
button:hover { opacity:0.8;}
.correct { background-color:green; color:white;}
.wrong { background-color:red; color:white;}
.next-btn { background-color:#3498db; color:white;}
</style>
</head>
<body>

<h1>Ben 10 Quiz Oyunu</h1>

<div class="quiz-box">
  <p id="question">Soru buraya gelecek</p>
  <div id="options"></div>
  <button id="next" class="next-btn" style="display:none;">Sonraki Soru</button>
</div>

<script>
const questions = [
  {q:"Ben’in en bilinen uzaylısı hangisidir?", correct:"Four Arms", wrong:["Heatblast","XLR8"]},
  {q:"Omnitrix ne işe yarar?", correct:"Ben’i farklı uzaylılara dönüştürür", wrong:["Zaman makinesi","Uçmayı sağlar"]},
  {q:"Ben’in kuzeni kimdir?", correct:"Gwen Tennyson", wrong:["Julie","Kevin Levin"]},
  {q:"Heatblast hangi tür uzaylıdır?", correct:"Pyronite", wrong:["Tetramand","Galvan"]},
  {q:"Wildmutt’un hangi duyusu en güçlüdür?", correct:"Koklama ve duyma", wrong:["Görme","Tat alma"]},
  {q:"Ben kaç yaşındaydı Alien Force’ta?", correct:"15 yaşında", wrong:["10 yaşında","12 yaşında"]},
  {q:"Big Chill’in özel gücü nedir?", correct:"Görünmez olma ve buz saldırısı", wrong:["Ateş püskürtme","Hızlı koşma"]},
  {q:"Feedback’in gücü nedir?", correct:"Enerji emme ve geri yansıtma", wrong:["Zihin okuma","Yer çekimi kontrolü"]},
  {q:"Vilgax’in Omniverse’teki planı nedir?", correct:"Evreni ele geçirmek ve Omnitrix’i almak", wrong:["Ben’i yakalamak","Gezegenleri yok etmek"]},
  {q:"Kevin Levin başlangıçta hangi taraftaydı?", correct:"Kötü", wrong:["İyi","Nötr"]}
];

let current = 0;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function showQuestion() {
  const q = questions[current];
  document.getElementById("question").innerText = q.q;

  const opts = [...q.wrong, q.correct];
  shuffle(opts);

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";
  opts.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.addEventListener("click", ()=>checkAnswer(btn,opt,q.correct));
    optionsDiv.appendChild(btn);
  });

  document.getElementById("next").style.display="none";
}

function checkAnswer(btn, selected, correct) {
  const buttons = document.querySelectorAll("#options button");
  buttons.forEach(b=>{
    b.disabled = true;
    if(b.innerText===correct){ b.classList.add("correct"); }
    else if(b===btn && selected!==correct){ b.classList.add("wrong"); }
  });
  document.getElementById("next").style.display="inline-block";
}

document.getElementById("next").addEventListener("click", ()=>{
  current = (current + 1) % questions.length;
  showQuestion();
});

showQuestion();
</script>

</body>
</html>
